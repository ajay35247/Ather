name: deploy

# Generic helm-based deploy. Replaces the previous deploy-feed.yml and
# deploy-services.yml. Accepts a service name, validates against the
# helm values allowlist (infra/helm/values/<name>.yaml), builds + pushes
# the image (if a Dockerfile exists), and runs `helm upgrade --install`.
#
# Like the predecessors, the actual cluster step is gated on
# `vars.DEPLOY_ENABLED == 'true'` and `secrets.KUBE_CONFIG_DATA`, so the
# workflow is safe to ship before any cluster exists.

on:
  workflow_call:
    inputs:
      service:
        type: string
        required: true
      environment:
        type: string
        default: stage
  workflow_dispatch:
    inputs:
      service:
        description: Service name (must match services/<name> and infra/helm/values/<name>.yaml)
        required: true
        type: string
      environment:
        description: Target environment
        type: choice
        options: [stage, prod]
        default: stage

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: deploy-${{ inputs.service }}-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  validate-input:
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.v.outputs.service }}
      environment: ${{ steps.v.outputs.environment }}
      image: ${{ steps.v.outputs.image }}
      has_dockerfile: ${{ steps.v.outputs.has_dockerfile }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          SVC="${{ inputs.service }}"
          ENV="${{ inputs.environment }}"
          if [ ! -d "services/${SVC}" ]; then
            echo "::error::services/${SVC} does not exist"; exit 1
          fi
          if [ ! -f "infra/helm/values/${SVC}.yaml" ]; then
            echo "::error::infra/helm/values/${SVC}.yaml does not exist"; exit 1
          fi
          HAS_DOCKERFILE=false
          if [ -f "services/${SVC}/Dockerfile" ]; then
            HAS_DOCKERFILE=true
          else
            echo "::warning::services/${SVC}/Dockerfile missing — image build will be skipped"
          fi
          {
            echo "service=${SVC}"
            echo "environment=${ENV}"
            echo "image=ghcr.io/${{ github.repository_owner }}/ather-${SVC}"
            echo "has_dockerfile=${HAS_DOCKERFILE}"
          } >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: validate-input
    if: needs.validate-input.outputs.has_dockerfile == 'true'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: |
          SHORT="$(echo "${{ github.sha }}" | cut -c1-7)"
          echo "tag=${SHORT}-${{ needs.validate-input.outputs.environment }}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ needs.validate-input.outputs.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ needs.validate-input.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ needs.validate-input.outputs.image }}:${{ needs.validate-input.outputs.environment }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-deploy:
    needs: [validate-input, build-and-push]
    # build-and-push is conditional, so we must allow it to be skipped
    # while still running helm-deploy. Use `always()` + explicit input check.
    if: |
      always() &&
      vars.DEPLOY_ENABLED == 'true' &&
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ needs.validate-input.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Helm upgrade --install
        run: |
          SVC="${{ needs.validate-input.outputs.service }}"
          IMAGE="${{ needs.validate-input.outputs.image }}"
          # If we built a fresh image, deploy that exact tag; otherwise use
          # the rolling environment tag (set by an earlier deploy or out-of-band).
          TAG="${{ needs.build-and-push.outputs.image_tag || needs.validate-input.outputs.environment }}"
          helm upgrade --install "${SVC}" ./infra/helm/_service \
            --namespace ather --create-namespace \
            --values "./infra/helm/values/${SVC}.yaml" \
            --set image.repository="${IMAGE}" \
            --set image.tag="${TAG}" \
            --atomic --timeout 5m
      - name: Smoke test
        run: |
          SVC="${{ needs.validate-input.outputs.service }}"
          kubectl -n ather rollout status "deploy/${SVC}" --timeout=180s
          kubectl -n ather get pods -l "app=${SVC}"
