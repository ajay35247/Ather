name: deploy-services

# Generic build+deploy workflow for any of the 37 Ather services.
# Triggered manually via workflow_dispatch (with a service name) or
# automatically on `main` for any path under `services/<name>/**`.
#
# Like deploy-feed.yml, the actual `helm upgrade` step is gated behind a
# `vars.DEPLOY_ENABLED == 'true'` repo variable + a `KUBE_CONFIG_DATA`
# secret, so this file is safe to ship before any cluster exists.

on:
  workflow_dispatch:
    inputs:
      service:
        description: Service name (must match services/<name> and infra/helm/values/<name>.yaml)
        required: true
        type: string
      environment:
        description: Target environment
        type: choice
        options: [stage, prod]
        default: stage

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: deploy-${{ github.event.inputs.service }}-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  validate-input:
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.v.outputs.service }}
      environment: ${{ steps.v.outputs.environment }}
      image: ${{ steps.v.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          SVC="${{ github.event.inputs.service }}"
          ENV="${{ github.event.inputs.environment }}"
          # Strict allowlist: must be a real service folder *and* have a values file.
          if [ ! -d "services/${SVC}" ]; then
            echo "::error::services/${SVC} does not exist"; exit 1
          fi
          if [ ! -f "infra/helm/values/${SVC}.yaml" ]; then
            echo "::error::infra/helm/values/${SVC}.yaml does not exist"; exit 1
          fi
          if [ ! -f "services/${SVC}/Dockerfile" ]; then
            echo "::warning::services/${SVC}/Dockerfile missing — only feed currently has one"
          fi
          echo "service=${SVC}"           >> "$GITHUB_OUTPUT"
          echo "environment=${ENV}"       >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${{ github.repository_owner }}/ather-${SVC}" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: validate-input
    runs-on: ubuntu-latest
    # Only run if there's a Dockerfile to build.
    if: ${{ hashFiles(format('services/{0}/Dockerfile', needs.validate-input.outputs.service)) != '' }}
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: |
          SHORT="$(echo "${{ github.sha }}" | cut -c1-7)"
          echo "tag=${SHORT}-${{ needs.validate-input.outputs.environment }}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ needs.validate-input.outputs.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ needs.validate-input.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ needs.validate-input.outputs.image }}:${{ needs.validate-input.outputs.environment }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-deploy:
    needs: [validate-input, build-and-push]
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    environment: ${{ needs.validate-input.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Helm upgrade --install
        run: |
          helm upgrade --install "${{ needs.validate-input.outputs.service }}" ./infra/helm/_service \
            --namespace ather --create-namespace \
            --values "./infra/helm/values/${{ needs.validate-input.outputs.service }}.yaml" \
            --set image.repository=${{ needs.validate-input.outputs.image }} \
            --set image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --atomic --timeout 5m
      - name: Smoke test
        run: |
          kubectl -n ather rollout status "deploy/${{ needs.validate-input.outputs.service }}" --timeout=180s
          kubectl -n ather get pods -l "app=${{ needs.validate-input.outputs.service }}"
