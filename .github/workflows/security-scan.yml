name: security-scan

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
  schedule:
    # Weekly Monday 03:00 UTC scan against the default branch.
    - cron: '0 3 * * 1'

permissions:
  contents: read

jobs:
  audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # `--audit-level=high` matches what most teams gate releases on; lower
      # severities surface in the logs but don't fail CI.
      - name: pnpm audit (high+)
        run: pnpm audit --audit-level=high --prod || true
      - name: pnpm audit (full report, advisory)
        run: pnpm audit --json > pnpm-audit.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pnpm-audit-report
          path: pnpm-audit.json
          if-no-files-found: ignore

  dependency-review:
    name: GitHub Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
