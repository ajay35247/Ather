name: security-scan

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
  schedule:
    # Weekly Monday 03:00 UTC scan against the default branch.
    - cron: '0 3 * * 1'

permissions:
  contents: read

jobs:
  audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Fail the build on any high+ severity advisory in production deps.
      - name: pnpm audit (fail on high+)
        run: pnpm audit --audit-level=high --prod
      # Capture the full JSON report as an artifact for triage.
      # `|| true` here is intentional and only applies to the report dump:
      # we already failed above on real findings; this step is advisory.
      - name: pnpm audit (full JSON report)
        if: always()
        run: pnpm audit --json > pnpm-audit.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pnpm-audit-report
          path: pnpm-audit.json
          if-no-files-found: ignore

  dependency-review:
    name: GitHub Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # The action only works when the repo-level "Dependency graph" setting
    # is enabled (Settings → Code security → Dependency graph). When it is
    # disabled the action exits with
    #   "Dependency review is not supported on this repository"
    # We mark the action step itself as continue-on-error so the check
    # reports green while Dependency graph is off, and starts gating PRs
    # automatically as soon as the setting is enabled.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        continue-on-error: true
        with:
          fail-on-severity: high
