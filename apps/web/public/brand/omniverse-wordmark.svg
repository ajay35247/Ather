<?xml version="1.0" encoding="UTF-8"?>
<!--
    Omniverse wordmark — horizontal lockup.

    Layout:
      [glyph 32x32]  [16px gap]  [text "Omniverse" — Inter, weight 600, tracking -0.02em]

    The text is rendered with <text> using a system font stack (Inter ->
    system-ui). This keeps the file under 2 KB and editable. For places
    that must be font-independent (print, partner usage), export to paths
    via a designer tool from this source.

    Width 220 / height 40 → aspect 5.5:1, suitable for headers and
    nav-bar lockups at 32–48 px height.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 40" role="img" aria-label="Omniverse">
    <title>Omniverse</title>
    <g fill="none">
        <circle cx="20" cy="20" r="13" stroke="currentColor" stroke-width="2.6" />
        <circle cx="29.4" cy="10.6" r="3.4" fill="currentColor" />
    </g>
    <text x="48" y="27"
          font-family="Inter, 'Inter var', system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="22"
          font-weight="600"
          letter-spacing="-0.4"
          fill="currentColor">Omniverse</text>
</svg>
