## Default values for the feed chart.
## Override per-environment via values.dev.yaml / values.stage.yaml / values.prod.yaml.

replicaCount: 3

image:
  repository: ghcr.io/ajay35247/ather-feed
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 4005

resources:
  requests:
    cpu: 100m
    memory: 192Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 50
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 2

# Secret values must be supplied externally (External Secrets / SealedSecrets).
secret:
  name: feed-secrets

env:
  NODE_ENV: production
  PORT: "4005"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4318

probes:
  readiness:
    path: /health
    initialDelaySeconds: 3
    periodSeconds: 5
    failureThreshold: 3
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 15
    failureThreshold: 3

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

networkPolicy:
  enabled: true
  ingressFromGateway: true

topologySpread:
  enabled: true

prometheus:
  scrape: true
  port: 4005
  path: /metrics
