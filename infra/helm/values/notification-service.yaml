# Auto-aligned with services/notification-service/src/index.ts (port 4009).
# Deploy with: helm upgrade --install notification-service infra/helm/_service \
#                -f infra/helm/values/notification-service.yaml \
#                --set image.tag=$GITHUB_SHA

service:
  plane: messaging
  port: 80
  targetPort: 4009

image:
  repository: ghcr.io/ajay35247/ather-notification-service

internalSecret:
  enabled: true

replicaCount: 3
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 50
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 75
pdb:
  enabled: true
  minAvailable: 2
