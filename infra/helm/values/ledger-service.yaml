# Auto-aligned with services/ledger-service/src/index.ts (port 4039).
# Deploy with: helm upgrade --install ledger-service infra/helm/_service \
#                -f infra/helm/values/ledger-service.yaml \
#                --set image.tag=$GITHUB_SHA

service:
  plane: economy
  port: 80
  targetPort: 4039

image:
  repository: ghcr.io/ajay35247/ather-ledger-service

internalSecret:
  enabled: true

replicaCount: 2
autoscaling:
  enabled: false
pdb:
  enabled: true
  minAvailable: 1
