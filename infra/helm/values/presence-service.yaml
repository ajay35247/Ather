# Auto-aligned with services/presence-service/src/index.ts (port 4008).
# Deploy with: helm upgrade --install presence-service infra/helm/_service \
#                -f infra/helm/values/presence-service.yaml \
#                --set image.tag=$GITHUB_SHA

service:
  plane: messaging
  port: 80
  targetPort: 4008

image:
  repository: ghcr.io/ajay35247/ather-presence-service

replicaCount: 3
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 50
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 75
pdb:
  enabled: true
  minAvailable: 2
