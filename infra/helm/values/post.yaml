# Auto-aligned with services/post/src/index.ts (port 4004).
# Deploy with: helm upgrade --install post infra/helm/_service \
#                -f infra/helm/values/post.yaml \
#                --set image.tag=$GITHUB_SHA

service:
  plane: content
  port: 80
  targetPort: 4004

image:
  repository: ghcr.io/ajay35247/ather-post

replicaCount: 3
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 50
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 75
pdb:
  enabled: true
  minAvailable: 2
