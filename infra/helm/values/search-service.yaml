# Auto-aligned with services/search-service/src/index.ts (port 4010).
# Deploy with: helm upgrade --install search-service infra/helm/_service \
#                -f infra/helm/values/search-service.yaml \
#                --set image.tag=$GITHUB_SHA

service:
  plane: content
  port: 80
  targetPort: 4010

image:
  repository: ghcr.io/ajay35247/ather-search-service

replicaCount: 3
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 50
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 75
pdb:
  enabled: true
  minAvailable: 2
