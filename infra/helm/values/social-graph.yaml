# Auto-aligned with services/social-graph/src/index.ts (port 4003).
# Deploy with: helm upgrade --install social-graph infra/helm/_service \
#                -f infra/helm/values/social-graph.yaml \
#                --set image.tag=$GITHUB_SHA

service:
  plane: social
  port: 80
  targetPort: 4003

image:
  repository: ghcr.io/ajay35247/ather-social-graph

replicaCount: 3
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 50
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 75
pdb:
  enabled: true
  minAvailable: 2
